<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Chatbot</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #ffffff;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            margin: 0;
            padding: 0;
        }

        .chat-container {
            width: 100%;
            max-width: 100%;
            height: 100vh;
            background: #ffffff;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            border: none;
            box-shadow: none;
            border-radius: 0;
        }

        .chat-header {
            background: #f7f7f8;
            color: #000000;
            padding: 16px 20px;
            text-align: center;
            font-size: 16px;
            font-weight: 600;
            border-bottom: 1px solid #e5e5e5;
        }

        .agent-buttons {
            display: flex;
            gap: 10px;
            padding: 16px 20px;
            background: #f7f7f8;
            border-bottom: 1px solid #e5e5e5;
        }

        .agent-btn {
            flex: 1;
            padding: 8px 16px;
            border: 1px solid #d1d5db;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            background: #ffffff;
            color: #374151;
        }

        .agent-btn.rag {
            background: #ffffff;
            color: #374151;
            border: 1px solid #d1d5db;
        }

        .agent-btn.agent {
            background: #ffffff;
            color: #374151;
            border: 1px solid #d1d5db;
        }

        
        .agent-btn.active {
            background: #3b82f6;
            color: #ffffff;
            border-color: #3b82f6;
        }

        .chat-messages {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            background: #ffffff;
            max-width: 768px;
            margin: 0 auto;
            width: 100%;
        }

        .message {
            margin-bottom: 24px;
            padding: 0;
            border-radius: 0;
            max-width: 100%;
            word-wrap: break-word;
            box-shadow: none;
            border: none;
            line-height: 1.6;
        }

        .message.user {
            background: transparent;
            color: #000000;
            margin-left: auto;
            text-align: right;
            border: none;
            padding: 0;
        }

        .message.user .message-content {
            background: #f7f7f8;
            color: #000000;
            padding: 12px 16px;
            border-radius: 18px;
            display: inline-block;
            max-width: 70%;
            text-align: left;
        }

        .message.bot {
            background: transparent;
            color: #0066cc;
            border: none;
            padding: 0;
        }

        .message.bot .message-content {
            color: #0066cc;
            padding: 0;
            display: block;
            max-width: 100%;
        }

        .thinking-indicator {
            display: none;
            align-items: center;
            gap: 8px;
            padding: 12px 16px;
            background: transparent;
            border-radius: 0;
            max-width: 100%;
            margin-bottom: 24px;
            border: none;
            box-shadow: none;
        }

        .thinking-indicator.active {
            display: flex;
        }

        .thinking-dot {
            width: 8px;
            height: 8px;
            background: #9ca3af;
            border-radius: 50%;
        }

        .thinking-text {
            color: #6b7280;
            font-weight: 400;
            font-style: italic;
            font-size: 14px;
        }

        .chat-input {
            display: flex;
            padding: 20px;
            background: #ffffff;
            border-top: 1px solid #e5e5e5;
            max-width: 768px;
            margin: 0 auto;
            width: 100%;
        }

        .message-input {
            flex: 1;
            padding: 12px 16px;
            border: 1px solid #d1d5db;
            border-radius: 12px;
            font-size: 16px;
            outline: none;
            background: #ffffff;
            box-shadow: none;
        }

        .message-input:focus {
            border-color: #3b82f6;
        }

        .send-btn {
            margin-left: 12px;
            padding: 12px 20px;
            background: #3b82f6;
            color: #ffffff;
            border: none;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            box-shadow: none;
        }

        .send-btn:disabled {
            background: #d1d5db;
            color: #9ca3af;
            cursor: not-allowed;
        }

        .status-indicator {
            padding: 12px 20px;
            background: #f7f7f8;
            text-align: center;
            font-size: 14px;
            font-weight: 500;
            border-bottom: 1px solid #e5e5e5;
            color: #6b7280;
        }

        .status-indicator.connected {
            background: #f0fdf4;
            color: #16a34a;
            border-color: #bbf7d0;
        }

        .status-indicator.disconnected {
            background: #fef2f2;
            color: #dc2626;
            border-color: #fecaca;
        }

        /* Scrollbar styling */
        .chat-messages::-webkit-scrollbar {
            width: 6px;
        }

        .chat-messages::-webkit-scrollbar-track {
            background: transparent;
        }

        .chat-messages::-webkit-scrollbar-thumb {
            background: #d1d5db;
            border-radius: 3px;
        }

        .chat-messages::-webkit-scrollbar-thumb:hover {
            background: #9ca3af;
        }
    </style>
</head>
<body>
    <div class="chat-container">
        <div class="chat-header">
            AI Chatbot Assistant
        </div>
        
        <div class="status-indicator" id="status">
            Connecting...
        </div>
        
        <div class="agent-buttons">
            <button class="agent-btn rag" id="ragBtn" onclick="selectAgent('rag')">
                📚 RAG Agent
            </button>
            <button class="agent-btn agent" id="agentBtn" onclick="selectAgent('agent')">
                🤖 Agent
            </button>
        </div>
        
        <div class="chat-messages" id="chatMessages">
            <div class="message bot">
                Hello! I'm your AI assistant. Please select an agent type and start chatting!
            </div>
        </div>
        
        <div class="thinking-indicator" id="thinkingIndicator">
            <div class="thinking-dot"></div>
            <div class="thinking-dot"></div>
            <div class="thinking-dot"></div>
            <span class="thinking-text">AI is thinking...</span>
        </div>
        
        <div class="chat-input">
            <input type="text" class="message-input" id="messageInput" 
                   placeholder="Type your message here..." 
                   onkeypress="handleKeyPress(event)">
            <button class="send-btn" id="sendBtn" onclick="sendMessage()" disabled>
                Send
            </button>
        </div>
    </div>

    <script>
        let currentAgent = null;
        let websocket = null;
        let sessionId = 'session_' + Date.now();
        let currentBotMessage = null;
        let isStreaming = false;

        function selectAgent(agentType) {
            currentAgent = agentType;
            
            // Update button states
            document.querySelectorAll('.agent-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            
            if (agentType === 'rag') {
                document.getElementById('ragBtn').classList.add('active');
                addMessage('bot', '📚 RAG Agent selected. I can help you with document-based questions!');
            } else if (agentType === 'agent') {
                document.getElementById('agentBtn').classList.add('active');
                addMessage('bot', '🤖 Agent selected. I can help you with various tasks and queries!');
            }
            
            // Connect to WebSocket
            connectWebSocket();
        }

        function connectWebSocket() {
            if (websocket) {
                websocket.close();
            }

            const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
            const wsUrl = `${protocol}//${window.location.host}/ws/${currentAgent}`;
            
            websocket = new WebSocket(wsUrl);
            
            websocket.onopen = function() {
                updateStatus('Connected to ' + currentAgent.toUpperCase() + ' Agent', true);
                document.getElementById('sendBtn').disabled = false;
            };
            
            websocket.onmessage = function(event) {
                const data = JSON.parse(event.data);
                
                if (data.type === 'thinking') {
                    toggleThinking(data.content);
                } else if (data.type === 'message') {
                    handleStreamingMessage(data.content);
                } else if (data.type === 'error') {
                    addMessage('bot', data.content);
                    toggleThinking(false);
                }
            };
            
            websocket.onclose = function() {
                updateStatus('Disconnected', false);
                document.getElementById('sendBtn').disabled = true;
            };
            
            websocket.onerror = function() {
                updateStatus('Connection Error', false);
                document.getElementById('sendBtn').disabled = true;
            };
        }

        function updateStatus(message, connected) {
            const status = document.getElementById('status');
            status.textContent = message;
            status.className = 'status-indicator ' + (connected ? 'connected' : 'disconnected');
        }

        function toggleThinking(show) {
            const indicator = document.getElementById('thinkingIndicator');
            if (show) {
                indicator.classList.add('active');
            } else {
                indicator.classList.remove('active');
            }
            scrollToBottom();
        }

        function addMessage(sender, content) {
            const messagesContainer = document.getElementById('chatMessages');
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${sender}`;
            
            if (sender === 'user') {
                const contentDiv = document.createElement('div');
                contentDiv.className = 'message-content';
                contentDiv.textContent = content;
                messageDiv.appendChild(contentDiv);
            } else {
                const contentDiv = document.createElement('div');
                contentDiv.className = 'message-content';
                contentDiv.textContent = content;
                messageDiv.appendChild(contentDiv);
            }
            
            messagesContainer.appendChild(messageDiv);
            scrollToBottom();
        }

        function handleStreamingMessage(content) {
            if (!isStreaming) {
                // Start a new message
                const messagesContainer = document.getElementById('chatMessages');
                currentBotMessage = document.createElement('div');
                currentBotMessage.className = 'message bot';
                
                const contentDiv = document.createElement('div');
                contentDiv.className = 'message-content';
                contentDiv.textContent = content;
                
                currentBotMessage.appendChild(contentDiv);
                messagesContainer.appendChild(currentBotMessage);
                isStreaming = true;
            } else {
                // Append to existing message
                const contentDiv = currentBotMessage.querySelector('.message-content');
                contentDiv.textContent += content;
            }
            scrollToBottom();
        }

        function finishStreaming() {
            isStreaming = false;
            currentBotMessage = null;
            toggleThinking(false);
        }

        function scrollToBottom() {
            const messagesContainer = document.getElementById('chatMessages');
            setTimeout(() => {
                messagesContainer.scrollTop = messagesContainer.scrollHeight;
            }, 100);
        }

        function sendMessage() {
            const input = document.getElementById('messageInput');
            const message = input.value.trim();
            
            if (message && currentAgent && websocket && websocket.readyState === WebSocket.OPEN) {
                addMessage('user', message);
                
                // Reset streaming state
                finishStreaming();
                
                websocket.send(JSON.stringify({
                    type: 'message',
                    content: message,
                    session_id: sessionId
                }));
                
                input.value = '';
            }
        }

        function handleKeyPress(event) {
            if (event.key === 'Enter') {
                sendMessage();
            }
        }

        // Initialize
        document.addEventListener('DOMContentLoaded', function() {
            updateStatus('Please select an agent to begin', false);
            scrollToBottom();
        });
    </script>
</body>
</html>
